x-service-base: &service-base
  build:
    context: ../../
    dockerfile: Dockerfile.dev
  env_file:
    - ../../.env
  environment:
    - DOCKER_ENV=true
    - DATABASE_URL=postgresql://taskflow:taskflow_secret@postgres:5432/taskflow
    - REDIS_URL=redis://redis:6379
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - taskflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - taskflow

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taskflow

  api-gateway:
    <<: *service-base
    command: pnpm --filter @taskflow/api-gateway run start
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    <<: *service-base
    command: pnpm --filter @taskflow/auth-service run start
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tenant-service:
    <<: *service-base
    command: pnpm --filter @taskflow/tenant-service run start
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  project-service:
    <<: *service-base
    command: pnpm --filter @taskflow/project-service run start
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  task-service:
    <<: *service-base
    command: pnpm --filter @taskflow/task-service run start
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  realtime-service:
    <<: *service-base
    command: pnpm --filter @taskflow/realtime-service run start
    ports:
      - "3005:3005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-service:
    <<: *service-base
    command: pnpm --filter @taskflow/notification-service run start
    ports:
      - "3006:3006"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  analytics-service:
    <<: *service-base
    command: pnpm --filter @taskflow/analytics-service run start
    ports:
      - "3007:3007"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  billing-service:
    <<: *service-base
    command: pnpm --filter @taskflow/billing-service run start
    ports:
      - "3008:3008"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker-service:
    <<: *service-base
    command: pnpm --filter @taskflow/worker-service run start
    ports:
      - "3009:3009"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3009/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - taskflow

volumes:
  pgdata:
  redisdata:

networks:
  taskflow:
    driver: bridge
