name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ─── Lint & Typecheck ────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@taskflow/utils" --filter "@taskflow/db" run build

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

  # ─── Build all services ─────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and services
        run: pnpm run build

  # ─── Integration test (docker-compose) ──────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> .env
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 32)" >> .env

      - name: Start services
        run: |
          docker-compose -f infra/docker/docker-compose.yml up -d postgres redis
          sleep 10

      - name: Check Postgres health
        run: |
          docker-compose -f infra/docker/docker-compose.yml exec -T postgres pg_isready -U taskflow -d taskflow

      - name: Check Redis health
        run: |
          docker-compose -f infra/docker/docker-compose.yml exec -T redis redis-cli ping

      - name: Teardown
        if: always()
        run: docker-compose -f infra/docker/docker-compose.yml down -v

  # ─── Docker build (per service) ─────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - tenant-service
          - project-service
          - task-service
          - realtime-service
          - notification-service
          - analytics-service
          - billing-service
          - worker-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
