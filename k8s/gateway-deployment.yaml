apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: task-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/example/task-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: task-saas-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: task-saas
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
