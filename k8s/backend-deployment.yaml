apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: task-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/task-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: task-saas-config
            - secretRef:
                name: task-saas-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: task-saas
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: task-saas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
