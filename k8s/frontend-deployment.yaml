apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: task-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/task-frontend:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: task-saas
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 5173
