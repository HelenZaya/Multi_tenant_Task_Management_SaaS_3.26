apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-backend
  namespace: zenith
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zenith-backend
  template:
    metadata:
      labels:
        app: zenith-backend
    spec:
      containers:
        - name: backend
          image: your-registry/zenith-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: zenith-config
            - secretRef:
                name: zenith-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-backend
  namespace: zenith
spec:
  selector:
    app: zenith-backend
  ports:
    - port: 4000
      targetPort: 4000
