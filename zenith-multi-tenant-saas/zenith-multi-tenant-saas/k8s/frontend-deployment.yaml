apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-frontend
  namespace: zenith
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zenith-frontend
  template:
    metadata:
      labels:
        app: zenith-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/zenith-frontend:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: zenith-frontend
  namespace: zenith
spec:
  selector:
    app: zenith-frontend
  ports:
    - port: 80
      targetPort: 5173
