apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zenith-ingress
  namespace: zenith
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - zenith.example.com
      secretName: zenith-tls
  rules:
    - host: zenith.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: zenith-backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zenith-frontend
                port:
                  number: 80
